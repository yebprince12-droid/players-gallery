<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="all">
      <h1>Top Four Of The Best Players To Ever Play Football</h1>
      <div class="messi">
        <div class="profile-image-messi"></div>
        <h2 class="messi-h">Messi</h2>
        <p class="messi-p">
          Known for being the player with the most trophies.
        </p>
        <button
          class="messi-follow"
          onclick="window.open('https://www.instagram.com/leomessi/', '_blank')"
        >
          Follow
        </button>
      </div>

      <div class="ronaldo">
        <div class="profile-image-ronaldo"></div>
        <h2 class="ronaldo-h">Ronaldo</h2>
        <p class="ronaldo-p">A player known for having the most goals</p>
        <button
          class="ronaldo-follow"
          onclick="
            window.open('https://www.instagram.com/cristiano/', '_blank')
          "
        >
          Follow
        </button>
      </div>

      <div class="neymar">
        <div class="profile-image-neymar"></div>
        <h2 class="neymar-h">Neymar</h2>
        <p class="neymar-p">A player known for having nice skills</p>
        <button
          class="neymar-follow"
          onclick="window.open('https://www.instagram.com/neymarjr/', '_blank')"
        >
          Follow
        </button>
      </div>

      <div class="ronaldinho">
        <div class="profile-image-ronaldinho"></div>
        <h2 class="ronaldinho-h">Ronaldinho</h2>
        <p class="ronaldinho-p">
          A legend who is loved <br />
          by Everyone and calm.
        </p>
        <button
          class="ronaldinho-follow"
          onclick="
            window.open('https://www.instagram.com/ronaldinho/', '_blank')
          "
        >
          Follow
        </button>
      </div>
    </div>
  </body>
</html>
